version: 2
updates:
  # ── Go CLI ───────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /cli
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "go"]
    commit-message:
      prefix: build
      include: scope

  # ── npm: web app ─────────────────────────────────────────
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "javascript"]
    commit-message:
      prefix: build
      include: scope

  # ── npm: landing site ────────────────────────────────────
  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "javascript"]
    commit-message:
      prefix: build
      include: scope

  # ── npm: root (semantic-release tooling) ─────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: build
      include: scope

  # ── GitHub Actions ───────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: ci
      include: scope

  # ── Docker: CLI images (Dockerfile + Dockerfile.goreleaser)
  - package-ecosystem: docker
    directory: /cli
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: build
      include: scope

  # ── Docker: web image ────────────────────────────────────
  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: build
      include: scope
