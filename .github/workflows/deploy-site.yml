name: Deploy Site

# Builds the Astro landing site in site/ and deploys it to GitHub Pages.
# Requires repo Settings → Pages → "Build and deployment" source = "GitHub Actions".
# Served at the custom domain in site/public/CNAME (diamond.xavidop.me).
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/screenshots/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build with Astro
        env:
          PUBLIC_GA_ID: ${{ vars.GA_MEASUREMENT_ID_LANDING }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
