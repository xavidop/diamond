name: Deploy Web to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-hosting.yml"
  pull_request:
    paths:
      - "web/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-hosting.yml"
  workflow_dispatch:

# Avoid overlapping deploys for the same ref.
concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build once and reuse the artifact for whichever deploy job runs.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install & build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  # Production deploy — only on push to main (or manual run).
  deploy-live:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Deploy to live channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          # Pin to the v13 line: firebase-tools 14/15 throw FAILED_PRECONDITION
          # ("supplied version is the current active version") on a no-op
          # release when CI rebuilds content identical to what's already live.
          firebaseToolsVersion: "13"
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DIAMOND_500520 }}
          projectId: diamond-500520
          channelId: live

  # Preview deploy — on pull requests; posts a temporary URL on the PR.
  deploy-preview:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Deploy to a preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseToolsVersion: "13"
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DIAMOND_500520 }}
          projectId: diamond-500520
          # Omitting channelId would default to a channel named after the PR;
          # set it explicitly so re-runs reuse the same preview URL.
          channelId: pr-${{ github.event.number }}
