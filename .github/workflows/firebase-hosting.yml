name: Deploy Web to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-hosting.yml"
  pull_request:
    paths:
      - "web/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-hosting.yml"
  workflow_dispatch:

# Avoid overlapping deploys for the same ref.
concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build once and reuse the artifact for whichever deploy job runs.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install & build
        working-directory: web
        env:
          VITE_GA_ID: ${{ vars.GA_MEASUREMENT_ID }}
        run: |
          npm ci
          npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  # Production deploy — only on push to main (or manual run).
  deploy-live:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      # Deploy via the firebase CLI directly rather than action-hosting-deploy.
      # firebase-tools 14/15 return a 400 FAILED_PRECONDITION ("supplied version
      # is the current active version") when the rebuilt content is byte-identical
      # to what's already live. That's a harmless no-op, but the action surfaces it
      # as a hard failure with no way to ignore it. Running the CLI ourselves lets
      # us treat that one specific message as success.
      - name: Deploy to live channel
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DIAMOND_500520 }}
        run: |
          set -o pipefail
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          if npx -y firebase-tools@latest deploy --only hosting \
               --project diamond-500520 --non-interactive 2>&1 | tee deploy.log; then
            echo "Deploy succeeded."
          elif grep -q "is the current active version" deploy.log; then
            echo "::notice::No content change — live channel already serves this version. Treating as success."
          else
            echo "::error::Firebase hosting deploy failed."
            exit 1
          fi

  # Preview deploy — on pull requests; posts a temporary URL on the PR.
  deploy-preview:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist
      - name: Deploy to a preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DIAMOND_500520 }}
          projectId: diamond-500520
          # Omitting channelId would default to a channel named after the PR;
          # set it explicitly so re-runs reuse the same preview URL.
          channelId: pr-${{ github.event.number }}
