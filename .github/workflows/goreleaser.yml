name: GoReleaser

# Triggered by the vX.Y.Z tag pushed by the Release workflow. Builds the Diamond
# CLI (binaries + archives), publishes the Homebrew formula to xavidop/homebrew-tap,
# pushes the CLI image to ghcr.io/xavidop/diamond, and (in parallel) builds and
# pushes the web image to ghcr.io/xavidop/diamond-web.
on:
  push:
    tags:
      - "v*"
  # Manual escape hatch: release an existing tag (e.g. if the tag push was
  # suppressed). Provide the tag, e.g. v1.0.0.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: CLI release (binaries, Homebrew, image)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: cli/go.sum

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  web-image:
    name: Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: web
          file: web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/xavidop/diamond-web:${{ steps.version.outputs.version }}
            ghcr.io/xavidop/diamond-web:latest
          labels: |
            org.opencontainers.image.title=diamond-web
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/xavidop/diamond
